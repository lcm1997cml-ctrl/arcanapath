    const starContainer = document.getElementById('starfield');
    const starCount = 200;
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.animation = `star-twinkle ${3 + Math.random() * 4}s infinite ease-in-out ${Math.random() * 5}s`;
      starContainer.appendChild(star);
    }
  </script>
<script data-purpose="card-arc-logic">
    const cardFan = document.getElementById('card-fan');
    const totalCards = 14; 
    const radius = 700;    
    const startAngle = -45; 
    const endAngle = 45;   
    
    // UI Update logic
    let selectedCount = 2;
    const progressContainer = document.getElementById('selection-progress');
    const interpretBtn = document.getElementById('interpret-btn');

    function updateProgressUI() {
      const dots = progressContainer.querySelectorAll('div');
      const text = progressContainer.querySelector('span');
      dots.forEach((dot, idx) => {
        if (idx < selectedCount) {
          dot.className = 'h-1.5 w-12 bg-secondary rounded-full transition-all duration-300 shadow-[0_0_8px_rgba(233,195,73,0.5)]';
        } else {
          dot.className = 'h-1.5 w-12 bg-white/10 rounded-full transition-all duration-300';
        }
      });
      text.innerText = `${selectedCount} / 3`;
      
      if (selectedCount >= 3) {
        interpretBtn.classList.remove('opacity-40', 'cursor-not-allowed');
        interpretBtn.classList.add('opacity-100', 'cursor-pointer');
      } else {
        interpretBtn.classList.add('opacity-40', 'cursor-not-allowed');
        interpretBtn.classList.remove('opacity-100', 'cursor-pointer');
      }
    }

    // Pre-selected card indices for visual fidelity
    const preSelected = [4, 7]; 

    for (let i = 0; i < totalCards; i++) {
      const angle = startAngle + (i * (endAngle - startAngle) / (totalCards - 1));
      const radian = angle * (Math.PI / 180);
      
      const x = radius * Math.sin(radian);
      const y = radius - radius * Math.cos(radian);

      const card = document.createElement('div');
      card.className = `tarot-card absolute left-1/2 top-10 w-32 h-52 bg-[#0b0e14] rounded-xl border border-secondary/20 flex items-center justify-center overflow-hidden shadow-2xl`;
      
      // Using the high-fidelity flat card back image https://lh3.googleusercontent.com/aida-public/AB6AXuCzj_fKnHM65YmoQa9wxulPLAGbKGD5czjdi6EG9PaEhEglbuD1tW5M-RtwD0SmHHxm0KZK9lWR6ANarNkTuGr49Em4nkqHHu85SMlbjvqIRGbQFDGUCEPRmfi6oooA_QWBsnbJ93txTiRLjn8Eq_h_JnMfm8wWtGbL694reZBImls4aDmgHj3yst4rdOzWCviBiO3jey3XPYN8zM8Tta9h4JU42eFoCxlSxcXb6Shd4k-PNbZNomE_e2ikK8CEj-BCfnv1lY6Cxto
      card.innerHTML = `
        <div class="absolute inset-0 z-0">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzj_fKnHM65YmoQa9wxulPLAGbKGD5czjdi6EG9PaEhEglbuD1tW5M-RtwD0SmHHxm0KZK9lWR6ANarNkTuGr49Em4nkqHHu85SMlbjvqIRGbQFDGUCEPRmfi6oooA_QWBsnbJ93txTiRLjn8Eq_h_JnMfm8wWtGbL694reZBImls4aDmgHj3yst4rdOzWCviBiO3jey3XPYN8zM8Tta9h4JU42eFoCxlSxcXb6Shd4k-PNbZNomE_e2ikK8CEj-BCfnv1lY6Cxto" alt="Tarot Card Back" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-secondary/5 mix-blend-overlay"></div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-midnight/40 to-transparent pointer-events-none"></div>
        <div class="absolute inset-0 border border-secondary/10 rounded-xl pointer-events-none"></div>
      `;

      // Positioning variables
      const yPos = y;
      const yHover = y - 40;
      const ySelected = y - 80;

      card.style.setProperty('--x', `${x}px`);
      card.style.setProperty('--y', `${yPos}px`);
      card.style.setProperty('--y-hover', `${yHover}px`);
      card.style.setProperty('--y-selected', `${ySelected}px`);
      card.style.setProperty('--original-rotate', `${angle}deg`);
      
      card.style.transform = `translateX(-50%) translate(${x}px, ${yPos}px) rotate(${angle}deg)`;
      
      if (preSelected.includes(i)) {
        card.classList.add('selected');
        card.style.transform = `translateX(-50%) translate(${x}px, ${ySelected}px) rotate(0deg) scale(1.15)`;
      }

      card.addEventListener('click', () => {
        if (!card.classList.contains('selected') && selectedCount >= 3) return;
        
        card.classList.toggle('selected');
        if (card.classList.contains('selected')) {
          selectedCount++;
          card.style.transform = `translateX(-50%) translate(${x}px, ${ySelected}px) rotate(0deg) scale(1.15)`;
        } else {
          selectedCount--;
          card.style.transform = `translateX(-50%) translate(${x}px, ${yPos}px) rotate(${angle}deg)`;
        }
        updateProgressUI();
      });

      cardFan.appendChild(card);
    }
  </script>
